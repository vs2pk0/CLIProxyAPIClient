name: Build and Release Clients

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-14
            artifact: cliproxyapi-desktop-macos
            asset_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - label: Windows x64
            runner: windows-latest
            artifact: cliproxyapi-desktop-windows
            asset_paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri client
        run: npm run tauri:build:ci

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset_paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Download client artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: find release-assets -maxdepth 2 -type f -print

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.ref_type == 'tag' && format('CLIProxyAPI Desktop {0}', github.ref_name) || format('CLIProxyAPI Desktop build {0}', github.run_number) }}
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
          body: |
            Automated desktop client build.

            Commit: `${{ github.sha }}`

            Assets:
            - macOS Apple Silicon: DMG installer
            - Windows x64: MSI and/or NSIS installer
          files: release-assets/*
